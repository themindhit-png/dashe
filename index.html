<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Не нажимай</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Игровой слой */
        #gameLayer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            background: radial-gradient(circle at center, #16213e, #0f3460);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.5s;
        }
        #gameLayer.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #message {
            color: white;
            font-size: 24px;
            margin-bottom: 40px;
            text-align: center;
            font-weight: bold;
            padding: 0 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .btn {
            padding: 18px 40px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            color: white;
            background: #e94560;
            box-shadow: 0 8px 20px rgba(233,69,96,0.5);
            cursor: pointer;
            transition: transform 0.1s, opacity 0.3s;
            white-space: nowrap;
            outline: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.93); }
        .btn.hidden { display: none; }

        /* Вторая кнопка – абсолютно внутри gameLayer */
        #step2btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #f39c12;
            box-shadow: 0 8px 20px rgba(243,156,18,0.5);
        }

        /* Третья кнопка-беглец */
        #runawayBtn {
            position: absolute;
            background: #e74c3c;
            font-size: 20px;
            padding: 18px 35px;
            z-index: 1001;
            box-shadow: 0 10px 25px rgba(231,76,60,0.5);
            transition: top 0.08s ease-out, left 0.08s ease-out;
        }
        #runawayBtn.caught {
            background: #27ae60 !important;
            box-shadow: 0 10px 25px rgba(39,174,96,0.7);
        }

        /* Видео */
        #videoContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: black;
        }
        #videoContainer.hidden { display: none; }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div id="gameLayer">
        <div id="message">Готов? Жми кнопку! 👇</div>
        <button class="btn" id="step1btn">НАЖИМАЮ</button>
        <button class="btn hidden" id="step2btn">Теперь тут</button>
        <button class="btn hidden" id="runawayBtn">Последний раз</button>
    </div>

    <div id="videoContainer" class="hidden">
        <video autoplay muted loop playsinline>
            <source src="v1c044g50000d8a3cfvog65s7edv2t7g.mov" type="video/mp4">
            Ваш браузер не поддерживает видео.
        </video>
    </div>

    <script>
        (function() {
            const gameLayer = document.getElementById('gameLayer');
            const videoContainer = document.getElementById('videoContainer');
            const message = document.getElementById('message');
            const step1btn = document.getElementById('step1btn');
            const step2btn = document.getElementById('step2btn');
            const runawayBtn = document.getElementById('runawayBtn');
            const video = document.querySelector('video');

            let runawayCount = 0;
            const maxRunaway = 7; // сколько раз убежит, прежде чем сдаться
            let canCatch = false;

            function showVideo() {
                gameLayer.classList.add('hidden');
                videoContainer.classList.remove('hidden');
                video.play().catch(() => {
                    video.muted = true;
                    video.play();
                });
            }

            // Этап 1
            step1btn.addEventListener('click', () => {
                step1btn.classList.add('hidden');
                step2btn.classList.remove('hidden');
                message.textContent = 'Теперь нажми там'; // коротко, без подсказок про убегание
            });

            // Этап 2
            step2btn.addEventListener('click', () => {
                step2btn.classList.add('hidden');
                runawayBtn.classList.remove('hidden');
                message.textContent = ''; // убираем сообщение, чтобы не палиться
                // размещаем по центру
                runawayBtn.style.top = '50%';
                runawayBtn.style.left = '50%';
                runawayBtn.style.transform = 'translate(-50%, -50%)';
                runawayCount = 0;
                canCatch = false;
                runawayBtn.classList.remove('caught');
                runawayBtn.textContent = 'Последний раз';

                // обработчики убегания
                runawayBtn.addEventListener('pointerenter', runAway);
                runawayBtn.addEventListener('touchstart', function(e) {
                    if (!canCatch) {
                        e.preventDefault();
                        runAway();
                    }
                }, { passive: false });
            });

            function getRandomCoords() {
                const btnWidth = runawayBtn.offsetWidth || 180;
                const btnHeight = runawayBtn.offsetHeight || 55;
                const maxX = window.innerWidth - btnWidth;
                const maxY = window.innerHeight - btnHeight;
                return {
                    x: Math.max(0, Math.random() * maxX),
                    y: Math.max(0, Math.random() * maxY)
                };
            }

            function runAway() {
                if (canCatch) return;
                runawayCount++;
                if (runawayCount >= maxRunaway) {
                    // сдаётся
                    canCatch = true;
                    runawayBtn.classList.add('caught');
                    runawayBtn.textContent = 'Ну ладно, жми';
                    runawayBtn.removeEventListener('pointerenter', runAway);
                    // возвращаем в центр
                    runawayBtn.style.top = '50%';
                    runawayBtn.style.left = '50%';
                    runawayBtn.style.transform = 'translate(-50%, -50%)';
                    return;
                }
                const { x, y } = getRandomCoords();
                runawayBtn.style.top = y + 'px';
                runawayBtn.style.left = x + 'px';
                runawayBtn.style.transform = 'none';
            }

            // Клик по пойманной кнопке
            runawayBtn.addEventListener('click', (e) => {
                if (!canCatch) {
                    e.preventDefault();
                    return;
                }
                showVideo();
            });

            // Корректировка позиции при ресайзе
            window.addEventListener('resize', () => {
                if (!canCatch && !runawayBtn.classList.contains('hidden') && runawayCount > 0) {
                    const rect = runawayBtn.getBoundingClientRect();
                    let top = parseFloat(runawayBtn.style.top) || (window.innerHeight/2);
                    let left = parseFloat(runawayBtn.style.left) || (window.innerWidth/2);
                    const maxX = window.innerWidth - rect.width;
                    const maxY = window.innerHeight - rect.height;
                    top = Math.min(Math.max(top, 0), maxY);
                    left = Math.min(Math.max(left, 0), maxX);
                    runawayBtn.style.top = top + 'px';
                    runawayBtn.style.left = left + 'px';
                }
            });
        })();
    </script>
</body>
</html>
